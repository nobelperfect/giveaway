;/* ---- src/Store.js ---- */
(function(){
function createStore(reducer, initialState, middlewares = []) {
    let state = initialState;
    const listeners = [];

    return {
        getState: () => state,
        subscribe: (listener) => {
            listeners.push(listener);
            listener(state);
            return () => listeners.splice(listeners.indexOf(listener), 1);
        },
        dispatch: (action) => {
            // IMPORTANT: Check interceptors FIRST
            for (const middleware of middlewares) {
                if (middleware({ getState: () => state }, action) === false) {
                    console.warn(`[Store] Action BLOCKED by Interceptor: ${action.type}`);
                    return false; // STOP EVERYTHING HERE
                }
            }

            // ONLY if all pass, run the reducer
            state = reducer(state, action);

            listeners.forEach(l => l(state));
            return true;
        }
    };
}

// Node (Jest)


// Browser (GAS)
if (typeof window !== 'undefined') {
    window.createStore = createStore;
}

})();

;/* ---- src/Reducer.js ---- */
(function(){

/**
   // * src/Reducer.js
   // * The "Accountant": Pure logic to handle state transitions.
   // */

const appReducer = (state, action) => {
    switch (action.type) {

        case 'UPDATE_EXCHANGE_RATE': {
            // Coerce to number and default to 0
            const newRate = Number(action.payload) || 0;

            const updatedRecipients = state.recipients.map(rec => {
                const refRate = Number(rec.referenceRate) || 0;

                // Fix: Defensive Ratio Calculation
                // If either rate is missing or 0, we set ratio to Infinity 
                // so the (ratio <= 0.55) check safely fails.
                const valueRatio = (refRate > 0 && newRate > 0)
                    ? refRate / newRate
                    : Infinity;

                let finalAmount = Number(rec.fixedETBAmount) || 0;
                let isAdjusted = false;

                // Threshold check (Safe from NaN/Infinity)
                if (valueRatio <= 0.55) {
                    const targetUSD = Number(rec.targetUSD) || 0;
                    finalAmount = targetUSD * newRate;
                    isAdjusted = true;
                }

                return { ...rec, amount: finalAmount, isAdjusted: isAdjusted };
            });

            // Inside the UPDATE_EXCHANGE_RATE case
            const totalFixed = updatedRecipients.reduce((sum, r) => sum + (Number(r.fixedETBAmount) || 0), 0);
            const totalActual = updatedRecipients.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
            const variance = totalActual - totalFixed;

            return {
                ...state,
                exchangeRates: { ...state.exchangeRates, current: newRate },
                recipients: updatedRecipients,
                analytics: {
                    totalFixed,
                    totalActual,
                    variance,
                    percentIncrease: totalFixed > 0 ? (variance / totalFixed) * 100 : 0
                }
            };
        }


        case 'CONFIRM_DISPATCH': {
            const recipient = state.recipients.find(r => r.id === action.payload);

            // Fix for rbug_001: Null check
            if (!recipient) {
                console.warn(`Dispatch failed: Recipient ${action.payload} not found.`);
                return state;
            }

            // Fix for rbug_002: Numeric validation and negative check
            const currentWallet = Number(state.wallet.remaining) || 0;
            const amountToSubtract = Number(recipient.amount) || 0;

            // Safety check: Don't allow dispatch if it exceeds wallet
            if (amountToSubtract > currentWallet) {
                console.error("Insufficient funds in wallet.");
                return state;
            }

            const updatedRecipients = state.recipients.map(r =>
                r.id === action.payload ? { ...r, status: 'dispatched' } : r
            );

            return {
                ...state,
                recipients: updatedRecipients,
                wallet: {
                    ...state.wallet,
                    remaining: currentWallet - amountToSubtract
                }
            };
        }

        case 'SET_RECEIPT_DATA': {
            const { id, url, fileId } = action.payload;
            const updatedRecipients = state.recipients.map(rec => {
                if (rec.id === id) {
                    return { ...rec, receiptUrl: url, receiptId: fileId };
                }
                return rec;
            });

            return {
                ...state,
                recipients: updatedRecipients
            };
        }

        case 'SET_SUCCESS_STORY': {
            const { id, url } = action.payload;
            const updatedRecipients = state.recipients.map(rec =>
                rec.id === id ? { ...rec, successStoryUrl: url } : rec
            );
            return { ...state, recipients: updatedRecipients };
        }
        case 'SET_LANGUAGE': {
            return {
                ...state,
                ui: {
                    ...state.ui,
                    language: action.payload // 'en' or 'am'
                }
            };
        }
        case 'TOGGLE_EXPAND': {
            return {
                ...state,
                recipients: state.recipients.map(rec => {
                    if (rec.id === action.payload) {
                        // FIX: Use !! to force a boolean check, then flip it.
                        // This ensures if it was undefined, it becomes true.
                        const currentStatus = !!rec.isExpanded;
                        return { ...rec, isExpanded: !currentStatus };
                    }
                    return rec;
                })
            };
        }
        // NEW: The Gallery Handler
        case 'ADD_GALLERY_ITEM':
            return {
                ...state,
                gallery: [action.payload, ...(state.gallery || [])]
            };


        default:
            return state;
    }
};



})();

;/* ---- src/Interceptors.js ---- */
(function(){

const securityInterceptor = (store, action) => {
  const state = store.getState();

  // Rule: Only 'admin' can update the wallet directly
  if (action.type === 'UPDATE_WALLET') {
    if (!state.user || state.user.role !== 'admin') {
      return false; // BLOCKED
    }
  }

  // Rule: Only 'agent' or 'admin' can confirm a dispatch
  if (action.type === 'CONFIRM_DISPATCH') {
    if (state.user.role === 'recipient') {
      return false; // BLOCKED
    }
  }

  return true; // ALLOWED
};



})();

;/* ---- src/UIComponents.js ---- */
(function(){
// src/UIComponents.js
const UIComponents = {
  escape: (str) => {
    if (typeof str !== 'string') return str;
    return str.replace(/[&<>"']/g, (m) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[m]);
  },
  
  render: (template, data) => {
    return template.replace(/\${\s*(\w+)\s*}/g, (match, key) => {
      const value = data[key] !== undefined ? data[key] : "";
      // Use the escape helper here!
      return UIComponents.escape(value);
    });
  }
};



})();

;/* ---- src/App.js ---- */
(function(){

/**
 * src/App.js - Pure Logic
 */
// 1. Security Helper: Prevents XSS by escaping <, >, &, etc.
const escapeHTML = (str) => {
    if (!str) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
};

// 1. GLOBAL HELPERS (Defined once, outside everything)
const _t = (key, lang = 'en') => {
    const dict = {
        en: { dash: "My Dispatches", wallet: "Wallet", confirm: "Confirm Payout", purpose: "Purpose", pending: "Pending", dispatched: "Dispatched", done: "Done" },
        am: { dash: "የእኔ ክፍያዎች", wallet: "ካፒታል", confirm: "ክፍያውን አረጋግጥ", purpose: "አላማ", pending: "በተጠባባቂ", dispatched: "ተከፍሏል", done: "ተከናውኗል" }
    };
    // Support both simple key lookup and language-based lookup
    const currentDict = dict[lang] || dict['en'];
    return currentDict[key] || key;
};

const formatCurrency = (amount) => {
    return new Intl.NumberFormat('en-US', {
        style: 'currency', currency: 'ETB'
    }).format(amount || 0);
};

/**
 * THE RENDERER
 */
function renderApp(state) {
    console.log("Rendering UI...");
    // FIX bug_002: Use document.body to ensure theme works in BOTH Prod and Dev
    const body = document.getElementById('ui-body') || document.body;

    const lang = (state.ui && state.ui.language) ? state.ui.language : 'en';

    // Re-capture templates every render in case fetch() finished late
    const TPL_CARD = getTpl('tpl-recipient-card');
    const TPL_HEADER = getTpl('tpl-agent-summary');
    const TPL_ANALYTICS = getTpl('tpl-admin-analytics');

    if (!TPL_CARD || !TPL_HEADER) {
        console.warn("Waiting for templates to load...");
        return;
    }

    // --- A. SYNC THE SHELL ---
    const dashTitle = document.getElementById('t-dash');
    const langBtn = document.getElementById('t-lang-btn');
    if (dashTitle) dashTitle.innerText = _t('dash', lang);
    if (langBtn) langBtn.innerText = lang === 'en' ? 'አማርኛ' : 'English';
    if (body) {
        lang === 'am' ? body.classList.add('lang-am') : body.classList.remove('lang-am');
    }

    // --- B. RENDER HEADER ---
    const headerEl = document.getElementById('header-component');
    if (headerEl) {
        headerEl.innerHTML = UIComponents.render(TPL_HEADER, {
            agent_name: state.user.name,
            balance_formatted: formatCurrency(state.wallet.remaining)
        });
    }

    // --- C. RENDER ADMIN ANALYTICS ---
    const adminContainer = document.getElementById('admin-oversight-container');
    if (adminContainer) {
        if (state.user.role === 'admin' && state.analytics) {
            const percent = Number(state.analytics.percentIncrease) || 0;
            let severity = percent > 25 ? 'critical' : (percent > 10 ? 'warning' : 'stable');
            adminContainer.innerHTML = UIComponents.render(TPL_ANALYTICS, {
                total_fixed: formatCurrency(state.analytics.totalFixed),
                total_actual: formatCurrency(state.analytics.totalActual),
                variance_etb: formatCurrency(state.analytics.variance),
                percent_increase: percent.toFixed(1),
                severity_class: severity
            });
            adminContainer.style.display = 'block';
        } else {
            adminContainer.style.display = 'none';
        }
    }

    // --- D. RENDER CARDS ---
    const container = document.getElementById('card-container');
    if (container) {
        container.innerHTML = state.recipients.map(rec => {
            const isExpanded = rec.isExpanded === true;
            return UIComponents.render(TPL_CARD, {
                id: rec.id,
                name: rec.name,
                amount_formatted: formatCurrency(rec.amount),
                // FIX: Ensure 'expanded' is added as a class only when true
                status_class: `${rec.status === 'dispatched' ? 'is-agent' : ''} ${isExpanded ? 'expanded' : ''}`.trim(),
                expand_icon: isExpanded ? '-' : '+',
                label_purpose: _t('purpose', lang),
                label_confirm: rec.status === 'pending' ? _t('confirm', lang) : _t('done', lang)
            });
        }).join('');
    }

    // --- 5. RENDER SUCCESS GALLERY ---
    const galleryContainer = document.getElementById('gallery-container');
    const tplGallery = document.getElementById('tpl-gallery-item')?.innerHTML;


    // Update Gallery Title Translation
    const galleryTitle = document.getElementById('t-gallery');
    if (galleryTitle) {
        galleryTitle.innerText = lang === 'am' ? 'የስኬት ታሪኮች' : 'Success Stories';
    }

    if (galleryContainer && tplGallery && state.gallery) {
        galleryContainer.innerHTML = state.gallery.map(item => {
            return UIComponents.render(tplGallery, {
                url: item.url,
                caption: escapeHTML(item.caption),
                date: item.date
            });
        }).join('');
    }
}

const getTpl = (id) => {
    const el = document.getElementById(id);
    if (!el) {
        console.warn(`Template ${id} missing, using fallback.`);
        return `<div class="error">Template ${id} not found</div>`;
    }
    return el.innerHTML;
};

/**
 * 2. BROWSER CONDUCTOR
 */

// --- 1. ATTACH GLOBAL ACTIONS TO WINDOW (Top Level) ---
// This ensures they are ALWAYS visible to the HTML templates
window.toggleLanguage = () => {
    const currentState = store.getState();
    const newLang = (currentState.ui && currentState.ui.language === 'en') ? 'am' : 'en';
    store.dispatch({ type: 'SET_LANGUAGE', payload: newLang });
};

window.toggleCard = (id) => {
    store.dispatch({ type: 'TOGGLE_EXPAND', payload: id });
};

window.openStory = (id) => {
    console.log("Gallery Click Detected for ID:", id);
    const state = store.getState();
    const item = state.gallery.find(i => i.id === id);

    if (item) {
        console.log("Opening:", item.caption);
         window.location.href = item.url;
    } else {
        console.warn("No story found for ID:", id);
    }
};

window.handleConfirm = (id) => {
    const inputEl = document.getElementById(`input-${id}`);
    const receiptId = inputEl ? inputEl.value : "";

    if (!receiptId || receiptId.trim().length < 4 || !/^[a-z0-9_-]+$/i.test(receiptId.trim())) {
        console.error("Invalid Receipt ID format");
        if (inputEl) inputEl.style.border = "2px solid var(--danger)";
        return;
    }

    const success = store.dispatch({ type: 'CONFIRM_DISPATCH', payload: id });
    if (!success) return;

    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(() => console.log('Sync complete'))
            .withFailureHandler(err => console.error('Sync failed:', err))
            .processDispatch(id, receiptId.trim());
    } else {
        console.log("DEV MODE: Confirmed", id, "with Receipt:", receiptId.trim());
    }
};

/**
 * 2. BROWSER CONDUCTOR (Bootstrap Only)
 */
if (typeof document !== 'undefined') {
    (function () {
        console.log("!!! APP STARTING !!!");
        const bridge = document.getElementById('state-bridge');
        if (!bridge || !bridge.dataset.state) return;

        const INITIAL_STATE = JSON.parse(bridge.dataset.state);

        // CREATE GLOBAL STORE
        // We attach it to window so our global actions above can access it
        window.store = createStore(appReducer, INITIAL_STATE, [securityInterceptor]);

        // Bootstrap
        store.subscribe(renderApp);
        renderApp(store.getState());
    })();
}

/**
 * 3. LOGIC EXPORTS FOR JEST (TDD)
 */
const AppLogic = {
    getSeverityClass: (percent) => {
        if (percent >= 25) return 'critical';
        if (percent > 10) return 'warning';
        return 'stable';
    },
    getStatusClass: (status) => `status-${status}`,
    _t: _t
};

// This helps our Build Script and Jest stay in sync
