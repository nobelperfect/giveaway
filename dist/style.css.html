<style>
    :root {
        /* ENGLISH THEME (Deep Navy) */
        --bg-deep: #0f172a;
        --bg-card: #1e293b;
        --border: #334155;
        --primary: #38bdf8;
        --success: #4ade80;
        --text-p: #f8fafc;
        --text-s: #94a3b8;
        --nav-bg: #1e293b;
        --accent: #38bdf8;
        --danger: #ef4444;
        --warning: #f59e0b;
    }

    body.lang-am {
        /* AMHARIC THEME (Heritage) */
        --bg-deep: #121212;
        --bg-card: #1a1a1a;
        --border: #2e3b23;
        --primary: #fedd00;
        --success: #009a44;
        --text-p: #ffffff;
        --text-s: #a0a0a0;
        --nav-bg: #1a1a1a;
        --accent: #009a44;
        font-family: 'Noto Sans Ethiopic', sans-serif;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-deep);
        color: var(--text-p);
        margin: 0;
        padding: 0;
        transition: all 0.4s ease;
    }

    /* --- Layout Containers --- */
    .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 15px;
    }

    /* --- Top Nav (Sticky Island) --- */
    .top-nav {
        background: var(--nav-bg);
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .nav-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* --- The Bubbly Cards --- */
    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 12px;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card:active {
        transform: scale(0.97);
    }

    .card.is-agent {
        border-left-color: var(--success);
    }

    /* --- NEW: Admin Severity Logic --- */
    .admin-summary.warning {
        border-left-color: var(--warning);
    }

    .admin-summary.critical {
        border-left-color: var(--danger);
    }

    .variance-track {
        background: rgba(255, 255, 255, 0.1);
        height: 6px;
        border-radius: 3px;
        margin: 10px 0;
        overflow: hidden;
    }

    .variance-fill {
        height: 100%;
        background: var(--primary);
        transition: width 1s ease;
    }

    .admin-summary.warning .variance-fill {
        background: var(--warning);
    }

    .admin-summary.critical .variance-fill {
        background: var(--danger);
    }

    /* --- Expansion Logic --- */
    .details-area {
        display: none;
        margin-top: 15px;
        border-top: 1px solid var(--border);
        padding-top: 15px;
    }

    .card.expanded .details-area {
        display: block;
        animation: slideDown 0.3s ease;
    }


    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Form Elements */
    .btn-confirm {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: var(--primary);
        color: #000;
        font-weight: 800;
        cursor: pointer;
    }

    .bubbly-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        padding: 12px;
        border-radius: 10px;
        color: white;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    .bubbly-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        color: white;
        margin-bottom: 10px;
        font-family: inherit;
        box-sizing: border-box;
        /* Critical for mobile sizing */
    }

    .bubbly-input:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.1);
    }

    /* Success Gallery Grid */
    .gallery-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
        padding-bottom: 50px;
    }

    .gallery-card {
        background: var(--bg-card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    .gallery-image {
        height: 120px;
        background-size: cover;
        background-position: center;
    }

    .gallery-info {
        padding: 8px;
    }

    .gallery-caption {
        font-size: 0.75rem;
        font-weight: 600;
        line-height: 1.2;
        color: var(--text-p);
    }

    .gallery-date {
        font-size: 0.6rem;
        color: var(--text-s);
        margin-top: 4px;
    }

    .gallery-card {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
    }

    /* Lift the card on hover */
    .gallery-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    /* Hover Overlay */
    .gallery-image {
        position: relative;
        overflow: hidden;
    }

    .gallery-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(56, 189, 248, 0.2);
        /* Tint with primary color */
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: 0.3s;
    }

    .gallery-card:hover .gallery-overlay {
        opacity: 1;
    }

    .gallery-overlay i {
        color: white;
        font-size: 1.5rem;
    }

    .gallery-overlay {
        position: absolute;
        /* ... existing styles ... */
        pointer-events: none;
        /* This ensures the click passes THROUGH to the card */
        opacity: 0;
    }
</style>
