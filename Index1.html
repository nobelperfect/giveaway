<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <style>
    :root {
      --mac-bg: rgba(255, 255, 255, 0.7);
      --mac-border: rgba(255, 255, 255, 0.3);
      --mac-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --accent: #007AFF;
      /* Apple Blue */
    }

    body {
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
      padding: 15px;
    }

    /* The Bubbly Card */
    .card {
      background: var(--mac-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--mac-border);
      border-radius: 22px;
      /* Apple-style squircle */
      box-shadow: var(--mac-shadow);
      margin-bottom: 15px;
      padding: 18px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      /* The "Bounce" */
      overflow: hidden;
      cursor: pointer;
    }

    /* Lift effect on touch/hover */
    .card:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.9);
    }

    /* Compressed vs Expanded logic */
    .card-content {
      display: grid;
      transition: max-height 0.5s ease-in-out;
    }

    .expanded-section {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.expanded .expanded-section {
      max-height: 1000px;
      /* Large enough for content */
      opacity: 1;
      padding-top: 15px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      margin-top: 10px;
    }

    /* Bubbly Buttons */
    .btn-confirm {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
    }

    /* Finance Dashboard */
    .input-group {
      margin-bottom: 10px;
    }

    label {
      display: inline-block;
      width: 150px;
    }

    input {
      padding: 5px;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.2em;
    }

    /* wallet-component */
    .dynamic-island {
      position: sticky;
      top: 10px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border-radius: 30px;
      padding: 10px 25px;
      margin-bottom: 20px;
      text-align: center;
      backdrop-filter: blur(20px);
    }

    .bubble {
      display: inline-block;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.2);
      margin: 0 5px;
    }
  </style>
</head>

<body>
  <div id="dashboard">
    <!-- Independent Components -->
    <header id="header-component"></header>
    <section id="wallet-component">
      <div id="wallet-component" class="dynamic-island">
        <div class="wallet-info">
          <span class="label">Remaining Budget</span>
          <h2 id="wallet-balance">0</h2> <!-- Animate this! -->
          <div class="indicators">
            <div class="bubble pending">5 Pending</div>
            <div class="bubble done">12 Done</div>
          </div>
        </div>
      </div>
    </section>
    <section id="stats-component"></section>

    <div id="search-bar">
      <input type="text" oninput="handleSearch(this.value)" placeholder="Search cards...">
    </div>

    <main id="cards-container"></main>
  </div>
  <script>

    // 1. The Global State (Our "Single Source of Truth")
    let appState = {};

    // 2. Initialization: Fetch data from Google Sheet
    window.onload = () => {
      google.script.run
        .withSuccessHandler((data) => {
          appState = data;
          renderAll(); // Initial render
        })
        .getInitialData(); // Your function in Code.gs
    };

    // 3. Renderers (The "Components")
    function renderWallet() {
      const walletEl = document.getElementById('wallet-component');
      walletEl.innerHTML = `
      <div class="wallet-card">
        <h3>Wallet Balance</h3>
        <p class="balance">${appState.wallet.remaining} ${appState.wallet.currency}</p>
      </div>
      `;
    }

    function renderCards() {
      const container = document.getElementById('cards-container');
      const filtered = appState.recipients.filter(r =>
        r.name.toLowerCase().includes(appState.ui.searchQuery.toLowerCase())
      );

      container.innerHTML = filtered.map(rec => `
      <div class="card ${rec.status}" onclick="toggleExpand('${rec.id}')">
        <div class="compressed-view">
          <span>${rec.name}</span>
          <span>${rec.amount} ETB</span>
          <span class="badge">${rec.status}</span>
        </div>
        ${rec.isExpanded ? renderExpandedView(rec) : ''}
      </div>
    `).join('');
    }

    // 4. Actions (The "AJAX" / State Update)
    function confirmDispatch(recipientId) {
      // a. Update local state immediately for "Smoothness"
      const rec = appState.recipients.find(r => r.id === recipientId);
      rec.status = 'dispatched';

      // Recalculate wallet locally
      appState.wallet.remaining -= (rec.amount + rec.details.fees.serviceCharge);

      // b. Re-render only the affected components
      renderWallet();
      renderCards();

      // c. Sync with Google Sheet in background (The AJAX call)
      google.script.run
        .withSuccessHandler(showSuccessToast)
        .updateSheetWithDispatch(recipientId, rec);
    }

    function handleSearch(val) {
      appState.ui.searchQuery = val;
      renderCards(); // Only cards re-render, Wallet stays untouched
    }

    function renderAll() {
      renderWallet();
      renderCards();
      // ...renderStats, renderHeader
    }


    function calculate() {
      const fixedETB = parseFloat(document.getElementById('fixedETB').value);
      const targetUSD = parseFloat(document.getElementById('targetUSD').value);
      const currentRate = parseFloat(document.getElementById('currentRate').value);
      const referenceRate = parseFloat(document.getElementById('referenceRate').value);

      google.script.run
        .withSuccessHandler(function (amount) {
          document.getElementById('result').innerText = 'Payable Amount: ' + amount + ' ETB';
        })
        .calculatePayableAmount(fixedETB, targetUSD, currentRate, referenceRate);
    }

    // Function to animate numbers for that "Native" feel
    function animateValue(id, start, end, duration) {
      const obj = document.getElementById(id);
      if (!obj) return;
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }

    // When the agent confirms a card
    function confirmDispatch(id) {
      const card = document.querySelector(`[data-id="${id}"]`);

      // 1. Add a "success" pop animation
      card.style.transform = "scale(1.05)";
      setTimeout(() => card.style.transform = "scale(1)", 200);

      // 2. Local State Update
      const oldBalance = appState.wallet.remaining;
      const rec = appState.recipients.find(r => r.id === id);
      appState.wallet.remaining -= (rec.amount + 25); // Example fee

      // 3. Update Wallet with Bubbly counter
      animateValue("wallet-balance", oldBalance, appState.wallet.remaining, 800);

      // 4. Update the card status visually without refreshing the whole list
      card.classList.add('dispatched');
      card.querySelector('.status-badge').innerHTML = "Dispatched";
    }

  </script>
</body>

</html>
