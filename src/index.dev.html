<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link rel="stylesheet" href="style.css">
</head>

<body id="ui-body">
  <nav class="top-nav">
    <div id="header-component"></div>
  </nav>
  <div class="container">
    <!-- NEW: The Dash Title & Language Toggle Target -->
    <div class="section-title">
      <span id="t-dash">My Dispatches</span>
      <button class="lang-toggle" onclick="toggleLanguage()" id="t-lang-btn">አማርኛ</button>
    </div>

    <div id="admin-oversight-container"></div>
    <div id="card-container"></div>
    <!-- NEW: The Success Gallery Slot -->
    <div class="section-title">
      <span id="t-gallery">Success Stories</span>
    </div>
    <div id="gallery-container" class="gallery-grid"></div>
  </div>

  <!-- 1. THE BRIDGE: Dynamically load the real Components.html -->
  <div id="template-load-area"></div>

  <script>
    // Local Dev Helper: Fetches the real Components.html so you don't have to copy-paste
    fetch('Components.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('template-load-area').innerHTML = html;
        console.log("Blueprints loaded from Components.html");

        // CRITICAL: Now that templates exist, load the App logic
        const script = document.createElement('script');
        script.src = 'App.js';
        document.body.appendChild(script);
      });
  </script>

  <!-- 2. MOCK DATA BRIDGE -->
  <div id="state-bridge" data-state='{
    "user": {"name": "Dev Admin", "role": "admin"},
    "wallet": {"remaining": 50000},
    "recipients": [
      {"id": "REC-01", "name": "Abebe Family", "status": "pending", "amount": 5000, "isExpanded": false},
      {"id": "REC-02", "name": "Bekele Shop", "status": "dispatched", "amount": 12000, "isExpanded": false}
    ],
    "ui": {"language": "en"},
    "gallery": [
      { "id": "S1",
        "url": "https://google.com", 
        "caption": "Abebe started his laundry business!", 
        "date": "April 2026" 
      },
      { "id": "S2",
        "url": "https://unsplash.com", 
        "caption": "New equipment for the local shop.", 
        "date": "March 2026" 
      }
    ],
    "analytics": { "totalFixed": 17000, "totalActual": 25000, "variance": 8000, "percentIncrease": 47.0 }
  }' style="display:none;"></div>

  <!-- 3. BASE LOGIC -->
  <script src="Store.js"></script>
  <script src="Reducer.js"></script>
  <script src="Interceptors.js"></script>
  <script src="UIComponents.js"></script>
  <!-- App.js is loaded dynamically above after templates are ready -->
</body>

</html>
