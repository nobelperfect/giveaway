name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      # ✅ TEST FIRST (critical)
      - name: Run Tests
        run: npm test

      # ✅ BUILD
      - name: Build Production Bundle
        run: npm run build

      # ✅ DEBUG (optional but powerful)
      - name: Verify Build Output
        run: ls -R dist

      # ✅ Ensure files exist
      - name: Ensure bundle exists
        run: test -f dist/bundle.js.html

      # ✅ AUTH
      - name: Create Clasp Auth File
        run: echo "${{ secrets.CLASPRC_JSON }}" > ~/.clasprc.json

      # ✅ Optional visibility
      - name: Check clasp status
        run: npx clasp status

      # ✅ DEPLOY
      - name: Push to Google Apps Script
        run: npx clasp push -f